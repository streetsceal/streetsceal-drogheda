<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreetScéal — Trail Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #f5f0e8;
      color: #2c2416;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.5rem 2rem 1rem;
      border-bottom: 1px solid #d8ceba;
      background: #f5f0e8;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: normal;
      letter-spacing: 0.02em;
      color: #2c2416;
    }

    header h1 em {
      font-style: italic;
      color: #8b5e2a;
    }

    header p {
      font-size: 0.78rem;
      color: #9e8c72;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: 'Courier New', monospace;
    }

    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: #ede8dc;
      border-right: 1px solid #d8ceba;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .trail-list {
      padding: 1rem 0;
    }

    .trail-group {
      margin-bottom: 0.25rem;
    }

    .trail-btn {
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.7rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-align: left;
      transition: background 0.15s;
      color: #6b5840;
    }

    .trail-btn:hover {
      background: #e4ddd0;
    }

    .trail-btn.active {
      background: #e4ddd0;
      color: #2c2416;
    }

    .trail-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .trail-label {
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: 'Courier New', monospace;
    }

    .stops-list {
      padding: 0 0 0.5rem 0;
      display: none;
    }

    .stops-list.open {
      display: block;
    }

    .stop-item {
      padding: 0.45rem 1.2rem 0.45rem 2.8rem;
      font-size: 0.8rem;
      color: #9e8c72;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.15s;
      font-family: 'Georgia', serif;
    }

    .stop-item:hover {
      color: #8b5e2a;
      border-left-color: #8b5e2a;
    }

    .stop-item.remote {
      font-style: italic;
      color: #b8a890;
    }

    .stop-item.remote::before {
      content: '↗ ';
      font-style: normal;
    }

    .sidebar-footer {
      padding: 1rem 1.2rem;
      border-top: 1px solid #d8ceba;
      margin-top: auto;
    }

    .sidebar-footer a {
      color: #8b5e2a;
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      font-family: 'Courier New', monospace;
    }

    .sidebar-footer a:hover {
      text-decoration: underline;
    }

    /* Map area */
    .map-container {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
      min-height: 500px;
    }

    /* Legend */
    .legend {
      position: absolute;
      bottom: 2rem;
      right: 1rem;
      background: rgba(245, 240, 232, 0.95);
      border: 1px solid #d8ceba;
      padding: 0.85rem 1rem;
      font-size: 0.75rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.06em;
      z-index: 10;
    }

    .legend-title {
      color: #9e8c72;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      font-size: 0.68rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.35rem;
      color: #6b5840;
      padding: 0.15rem 0.3rem;
      margin-left: -0.3rem;
      border-radius: 2px;
      transition: background 0.15s, color 0.15s;
    }

    .legend-item:hover {
      background: rgba(139,94,42,0.08);
      color: #2c2416;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Info panel */
    .info-panel {
      position: absolute;
      top: 1rem;
      left: 1rem;
      background: rgba(245, 240, 232, 0.97);
      border: 1px solid #d8ceba;
      padding: 1rem 1.2rem;
      max-width: 260px;
      z-index: 10;
      display: none;
    }

    .info-panel.visible {
      display: block;
    }

    .info-trail-tag {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-family: 'Courier New', monospace;
      margin-bottom: 0.4rem;
    }

    .info-stop-name {
      font-size: 1rem;
      color: #2c2416;
      margin-bottom: 0.5rem;
    }

    .info-stop-desc {
      font-size: 0.78rem;
      color: #6b5840;
      line-height: 1.5;
      margin-bottom: 0.8rem;
    }

    .info-enter-btn {
      display: inline-block;
      padding: 0.4rem 0.9rem;
      border: 1px solid #8b5e2a;
      color: #8b5e2a;
      text-decoration: none;
      font-size: 0.72rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .info-enter-btn:hover {
      background: #8b5e2a;
      color: #f5f0e8;
    }

    .info-close {
      position: absolute;
      top: 0.6rem;
      right: 0.8rem;
      background: none;
      border: none;
      color: #b8a890;
      cursor: pointer;
      font-size: 1rem;
    }

    .info-close:hover { color: #6b5840; }

    @media (max-width: 640px) {
      .sidebar { width: 100%; height: 180px; border-right: none; border-bottom: 1px solid #d8ceba; }
      .layout { flex-direction: column; }
      .stops-list { display: none !important; }
      header { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <a href="https://streetsceal.ie" style="text-decoration:none; color:inherit;">
    <h1>Street<em>Scéal</em></h1>
  </a>
  <p>53°43′N · 6°21′W · Drogheda · Trail Map</p>
</header>

<div class="layout">
  <aside class="sidebar">
    <nav class="trail-list" id="trailList"></nav>
    <div class="sidebar-footer">
      <a href="https://streetsceal.ie" target="_blank">← Return to StreetScéal</a>
    </div>
  </aside>

  <div class="map-container">
    <div id="map"></div>

    <div class="info-panel" id="infoPanel">
      <button class="info-close" id="infoClose">✕</button>
      <div class="info-trail-tag" id="infoTrail"></div>
      <div class="info-stop-name" id="infoName"></div>
      <div class="info-stop-desc" id="infoDesc"></div>
      <a class="info-enter-btn" id="infoLink" href="#" target="_blank">Enter trail →</a>
    </div>

    <div class="legend" id="mapLegend">
      <div class="legend-title">Jump to trail start</div>
    </div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let TRAILS = [];
  let map;
  const allMarkers = [];
  const allPolylines = [];

  // ── Load trails.json, then boot the map ───────────────────────────────────
  fetch('trails.json')
    .then(r => r.json())
    .then(data => {
      TRAILS = data.trails;
      buildSidebar();
      loadGoogleMaps();
    })
    .catch(err => {
      console.error('Could not load trails.json:', err);
      document.getElementById('trailList').innerHTML =
        '<p style="padding:1rem;color:#8b5e2a;font-size:0.8rem;">Could not load trail data.</p>';
    });

  // ── Sidebar ────────────────────────────────────────────────────────────────
  function buildSidebar() {
    const trailList = document.getElementById('trailList');
    const legend = document.getElementById('mapLegend');
    trailList.innerHTML = '';

    TRAILS.forEach(trail => {
      const group = document.createElement('div');
      group.className = 'trail-group';

      const btn = document.createElement('button');
      btn.className = 'trail-btn';
      btn.dataset.id = trail.id;
      btn.innerHTML = `
        <span class="trail-dot" style="background:${trail.color}"></span>
        <span class="trail-label">${trail.label}</span>
      `;

      const stopsList = document.createElement('div');
      stopsList.className = 'stops-list';
      stopsList.id = `stops-${trail.id}`;

      trail.stops.forEach(stop => {
        const item = document.createElement('div');
        item.className = 'stop-item' + (stop.remote ? ' remote' : '') + (stop.linking ? ' linking' : '');
        // Show audio/AR badges
        const badges = [];
        if (stop.hasAudio) badges.push('♪');
        if (stop.hasAR) badges.push('AR');
        const badgeHtml = badges.length ? `<span style="float:right;font-size:0.65rem;color:${trail.color};opacity:0.7">${badges.join(' ')}</span>` : '';
        item.innerHTML = stop.name + badgeHtml;
        item.addEventListener('click', () => focusStop(trail, stop));
        stopsList.appendChild(item);
      });

      btn.addEventListener('click', () => toggleTrail(trail.id, btn, stopsList));
      group.appendChild(btn);
      group.appendChild(stopsList);
      trailList.appendChild(group);

      // Legend entry — jumps map to this trail's starting stop
      const li = document.createElement('div');
      li.className = 'legend-item';
      li.style.cursor = 'pointer';
      li.innerHTML = `<span class="legend-dot" style="background:${trail.color}"></span><span>${trail.label}</span>`;
      li.addEventListener('click', () => jumpToTrailStart(trail));
      legend.appendChild(li);
    });
  }

  function toggleTrail(id, btn, list) {
    const isOpen = list.classList.contains('open');
    document.querySelectorAll('.stops-list').forEach(l => l.classList.remove('open'));
    document.querySelectorAll('.trail-btn').forEach(b => b.classList.remove('active'));
    if (!isOpen) {
      list.classList.add('open');
      btn.classList.add('active');
      const trail = TRAILS.find(t => t.id === id);
      const local = trail.stops.filter(s => !s.remote);
      if (local.length && map) {
        const avgLat = local.reduce((a, s) => a + s.lat, 0) / local.length;
        const avgLng = local.reduce((a, s) => a + s.lng, 0) / local.length;
        map.panTo({ lat: avgLat, lng: avgLng });
        map.setZoom(id === 'plunkett' || id === 'diaspora' ? 5 : 15);
      }
    }
  }

  // Jump map straight to a trail's first stop — used by the legend shortcut
  function jumpToTrailStart(trail) {
    if (!map || !trail.stops.length) return;
    const start = trail.stops[0];
    map.panTo({ lat: start.lat, lng: start.lng });
    map.setZoom(17);
    focusStop(trail, start);
  }

  // ── Map init (called by Google Maps callback) ──────────────────────────────
  function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 53.7185, lng: -6.352 },
      zoom: 15,
      styles: [
        { elementType: 'geometry', stylers: [{ color: '#ebe5d8' }] },
        { elementType: 'labels.text.stroke', stylers: [{ color: '#ebe5d8' }] },
        { elementType: 'labels.text.fill', stylers: [{ color: '#6b5840' }] },
        { featureType: 'administrative.locality', elementType: 'labels.text.fill', stylers: [{ color: '#8b5e2a' }] },
        { featureType: 'poi', elementType: 'labels.text.fill', stylers: [{ color: '#8b6840' }] },
        { featureType: 'poi.park', elementType: 'geometry', stylers: [{ color: '#d4e6c8' }] },
        { featureType: 'poi.park', elementType: 'labels.text.fill', stylers: [{ color: '#507040' }] },
        { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#f5f0e4' }] },
        { featureType: 'road', elementType: 'geometry.stroke', stylers: [{ color: '#d8ceba' }] },
        { featureType: 'road', elementType: 'labels.text.fill', stylers: [{ color: '#9e8060' }] },
        { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#d4b896' }] },
        { featureType: 'road.highway', elementType: 'geometry.stroke', stylers: [{ color: '#c8a880' }] },
        { featureType: 'road.highway', elementType: 'labels.text.fill', stylers: [{ color: '#5c3d18' }] },
        { featureType: 'transit', elementType: 'geometry', stylers: [{ color: '#ddd5c0' }] },
        { featureType: 'transit.station', elementType: 'labels.text.fill', stylers: [{ color: '#8b6840' }] },
        { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#a8c8d8' }] },
        { featureType: 'water', elementType: 'labels.text.fill', stylers: [{ color: '#4a7090' }] },
        { featureType: 'water', elementType: 'labels.text.stroke', stylers: [{ color: '#a8c8d8' }] },
      ],
      mapTypeControl: false,
      streetViewControl: false,
      fullscreenControl: true,
      zoomControl: true,
    });

    // Wait for TRAILS to be populated (fetch may still be in flight)
    if (TRAILS.length) renderMapData();
    else window._mapReady = true;
  }

  function renderMapData() {
    TRAILS.forEach(trail => {
      const coords = trail.stops.map(s => ({ lat: s.lat, lng: s.lng }));

      new google.maps.Polyline({
        path: coords,
        geodesic: true,
        strokeColor: trail.color,
        strokeOpacity: 0.45,
        strokeWeight: 2,
        map,
      });

      trail.stops.forEach(stop => {
        const marker = new google.maps.Marker({
          position: { lat: stop.lat, lng: stop.lng },
          map,
          title: stop.name,
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: stop.remote ? 5 : 7,
            fillColor: trail.color,
            fillOpacity: stop.remote ? 0.5 : 1,
            strokeColor: '#f5f0e8',
            strokeWeight: 2,
          },
          zIndex: stop.remote ? 1 : 2,
        });
        marker.addListener('click', () => focusStop(trail, stop));
        allMarkers.push(marker);
      });
    });
  }

  function focusStop(trail, stop) {
    const panel = document.getElementById('infoPanel');
    document.getElementById('infoTrail').textContent = trail.label;
    document.getElementById('infoTrail').style.color = trail.color;
    document.getElementById('infoName').textContent = stop.name;
    // Show subtitle/era and audio+AR status
    const meta = [stop.subtitle, stop.era].filter(Boolean).join(' · ');
    const flags = [stop.hasAudio ? '♪ Audio' : '', stop.hasAR ? 'AR' : ''].filter(Boolean).join(' · ');
    document.getElementById('infoDesc').innerHTML =
      `${stop.desc}<br><span style="font-size:0.7rem;color:#9e8c72;font-family:monospace">${meta}</span>` +
      (flags ? `<br><span style="font-size:0.7rem;color:${trail.color};font-family:monospace">${flags}</span>` : '');
    document.getElementById('infoLink').href = trail.url;
    panel.classList.add('visible');
    map.panTo({ lat: stop.lat, lng: stop.lng });
  }

  document.getElementById('infoClose').addEventListener('click', () => {
    document.getElementById('infoPanel').classList.remove('visible');
  });

  // ── Load Google Maps ───────────────────────────────────────────────────────
  function loadGoogleMaps() {
    // If map already initialised (unlikely but safe), just render data
    if (map) { renderMapData(); return; }
    const script = document.createElement('script');
    script.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyASmpOeRPerSlZ7WcyEo_ecdFEAd4pIP3E&callback=initMap';
    script.async = true;
    script.defer = true;
    document.head.appendChild(script);
  }
</script>
</body>
</html>
