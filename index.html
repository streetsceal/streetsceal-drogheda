<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>StreetScéal — Drogheda</title>

  <!-- MindAR + A-Frame for image tracking -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

    :root {
      --ink:        #1a1612;
      --paper:      #e8e0d0;
      --paper-dark: #cfc5b0;
      --rust:       #8b3a2a;
      --rust-light: #a8503e;
      --rust-dim:   rgba(139,58,42,0.12);
      --ghost:      rgba(232,224,208,0.06);

      --display: 'Playfair Display', Georgia, serif;
      --body:    'EB Garamond', Georgia, serif;
      --mono:    'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--ink);
      color: var(--paper);
      font-family: var(--body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      background-size: 256px;
      pointer-events: none;
      opacity: 0.35;
      z-index: 0;
    }

    /* ── Layout ── */
    .page { position: relative; z-index: 1; }

    /* ── Header ── */
    .site-header {
      padding: 3rem 2rem 0;
      text-align: center;
    }

    .header-rule {
      width: 1px;
      height: 48px;
      background: var(--rust);
      margin: 0 auto 2rem;
    }

    .header-eyebrow {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--rust-light);
      margin-bottom: 1.2rem;
    }

    .site-title {
      font-family: var(--display);
      font-size: clamp(3rem, 12vw, 6rem);
      font-weight: 400;
      font-style: italic;
      line-height: 1;
      color: var(--paper);
      margin-bottom: 0.3rem;
      letter-spacing: -0.02em;
    }

    .site-title span { color: var(--rust); }

    .site-location {
      font-family: var(--display);
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 400;
      color: var(--paper-dark);
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }

    .header-coords {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: var(--rust);
      margin-bottom: 3rem;
    }

    /* Signature element: the grain texture overlay */
    #screen-entry::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
      background-size: 256px;
      pointer-events: none;
      opacity: 0.4;
      z-index: 0;
    }
    #screen-entry > * { position: relative; z-index: 1; }

    /* ── Button ───────────────────────────────────────────────────── */
    .btn-primary {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--paper);
      background: transparent;
      border: 1px solid var(--rust);
      padding: 0.9rem 2.2rem;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }
    .btn-primary:hover, .btn-primary:focus {
      background: var(--rust);
      color: var(--paper);
      outline: none;
    }

    /* ── Trail Screen ─────────────────────────────────────────────── */
    #screen-trail {
      background: var(--ink);
      justify-content: flex-start;
      padding: 0;
      overflow-y: auto;
    }

    .trail-header {
      width: 100%;
      padding: 2rem 1.5rem 1rem;
      border-bottom: 1px solid rgba(232,224,208,0.12);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .trail-header-title {
      font-family: var(--display);
      font-size: 1.1rem;
      font-style: italic;
      color: var(--paper-dark);
    }

    .trail-header-count {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--rust);
      text-transform: uppercase;
    }

    .trail-list {
      width: 100%;
      padding: 1rem 0 6rem;
    }

    .stop-card {
      display: flex;
      align-items: flex-start;
      gap: 1.2rem;
      padding: 1.4rem 1.5rem;
      border-bottom: 1px solid rgba(232,224,208,0.08);
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }
    .stop-card:hover { background: var(--ghost); }

    .stop-card.active {
      background: rgba(139, 58, 42, 0.12);
      border-left: 2px solid var(--rust);
    }

    .stop-card.locked { opacity: 0.38; cursor: default; }
    .stop-card.locked:hover { background: transparent; }

    .stop-number {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--rust);
      letter-spacing: 0.1em;
      padding-top: 0.2rem;
      min-width: 2rem;
    }

    .stop-info { flex: 1; }

    .stop-name {
      font-family: var(--display);
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--paper);
      margin-bottom: 0.2rem;
    }

    .stop-description {
      font-family: var(--body);
      font-style: italic;
      font-size: 0.82rem;
      color: var(--paper-dark);
      line-height: 1.45;
      margin-bottom: 0.5rem;
    }

    .stop-meta {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--rust-light);
    }

    .stop-proximity {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--paper-dark);
      text-align: right;
      white-space: nowrap;
      padding-top: 0.2rem;
    }

    .proximity-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--rust);
      margin-right: 0.3rem;
      vertical-align: middle;
    }
    .proximity-dot.near { background: #5a9a6a; animation: pulse 1.8s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.4); }
    }

    /* ── GPS Status bar ───────────────────────────────────────────── */
    .gps-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--ink);
      border-top: 1px solid rgba(232,224,208,0.12);
      padding: 0.8rem 1.5rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 0.6rem;
      gap: 1rem;
    }
    .gps-icon.active { background: #5a9a6a; animation: pulse 2s infinite; }

    .gps-text {
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--paper-dark);
      flex: 1;
    }

    .trail-status {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--rust-light);
      background: transparent;
      border: 1px solid rgba(139,58,42,0.4);
      padding: 0.3rem 0.7rem;
      cursor: pointer;
    }

    /* ── Stop Detail Screen ───────────────────────────────────────── */
    #screen-stop {
      background: var(--ink);
      justify-content: flex-start;
      padding: 0.8rem 1rem;
      overflow-y: auto;
      z-index: 30;
    }

    .stop-header {
      width: 100%;
      padding: 2rem 1.5rem 1.5rem;
      background: linear-gradient(180deg, rgba(139,58,42,0.15) 0%, transparent 100%);
    }

    .back-btn {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--rust-light);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .stop-detail-eyebrow {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--rust);
      margin-bottom: 0.6rem;
    }

    .stop-detail-title {
      font-family: var(--display);
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      font-weight: 700;
      color: var(--paper);
      line-height: 1.15;
      margin-bottom: 0.5rem;
    }

    .trail-tagline {
      font-family: var(--body);
      font-style: italic;
      font-size: 0.9rem;
      color: var(--paper-dark);
      margin-bottom: 1.2rem;
      line-height: 1.5;
    }

    .trail-stops {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .trail-stop-tag {
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(232,224,208,0.4);
      background: rgba(232,224,208,0.05);
      padding: 0.2rem 0.5rem;
    }

    .trail-arrow {
      position: absolute;
      right: 1.8rem;
      bottom: 2rem;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--rust);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .trail-card:not(.coming-soon):hover .trail-arrow { opacity: 1; }

    /* ── Map hint ── */
    .map-hint {
      text-align: center;
      padding: 0 2rem 5rem;
    }

    .map-hint p {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(232,224,208,0.25);
      line-height: 2;
    }

    /* ── Footer ── */
    .site-footer {
      border-top: 1px solid rgba(232,224,208,0.08);
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-brand {
      font-family: var(--display);
      font-size: 0.9rem;
      font-style: italic;
      color: var(--paper);
    }

    .ar-close-btn {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--paper-dark);
      background: none;
      border: 1px solid rgba(232,224,208,0.3);
      padding: 0.4rem 0.8rem;
      cursor: pointer;
       pointer-events: auto;
    }

    .ar-hint {
      position: absolute;
      bottom: 2.5rem; left: 0; right: 0;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--rust-light);
      text-decoration: none;
    }

    .footer-links a:hover { color: var(--paper); }

    /* ── Compass decoration ── */
    .compass-wrap {
      display: flex;
      justify-content: center;
      padding: 2rem 0 0;
      opacity: 0.18;
    }

    .compass-wrap svg { width: 48px; height: 48px; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .site-header { padding: 2rem 1.5rem 0; }
      .trails { padding: 0 1rem 4rem; }
      .trail-card { padding: 1.6rem 1.4rem; }
      .site-footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     SCREEN 1 — ENTRY
══════════════════════════════════════════════ -->
<div class="screen" id="screen-entry">
  <div class="entry-rule"></div>
  <p class="entry-eyebrow">Drogheda · Co. Louth</p>
  <h1 class="entry-title">Street<br><em>Scéal</em></h1>
  <p class="entry-subtitle">Walk the streets of Drogheda. The stories are there to be heard.</p>
  <p class="entry-location">53°43′N · 6°21′W</p>
  <button class="btn-primary" id="btn-enter" onclick="enterTrail()">Begin your journey</button>
</div>

<!-- ══════════════════════════════════════════════
     SCREEN 2 — TRAIL MAP / STOP LIST
══════════════════════════════════════════════ -->
<div class="screen hidden" id="screen-trail" style="justify-content:flex-start; overflow-y:auto;">
  <div class="trail-header">
    <span class="trail-header-title">StreetScéal</span>
    <span class="trail-header-count" id="trail-count">0 of 4 visited</span>
  </div>

  <div class="trail-list" id="trail-list"></div>

  <div class="gps-bar">
    <div class="gps-icon" id="gps-icon"></div>
    <span class="gps-text" id="gps-text">Requesting location…</span>
    <button class="gps-demo-btn" onclick="simulateNearby()">Demo mode</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     SCREEN 3 — STOP DETAIL
══════════════════════════════════════════════ -->
<div class="screen hidden" id="screen-stop" style="justify-content:flex-start; overflow-y:auto;">
  <div class="stop-header">
    <button class="back-btn" onclick="showScreen('trail')">&larr; Trail</button>
    <p class="stop-detail-eyebrow" id="detail-eyebrow"></p>
    <h2 class="stop-detail-title" id="detail-title"></h2>
    <p class="stop-detail-subtitle" id="detail-subtitle"></p>
  </div>
  <div class="stop-body">
    <p class="stop-lore" id="detail-lore"></p>
    <p class="stop-text" id="detail-text"></p>

    <div class="audio-block">
      <p class="audio-label">Archive audio</p>
      <div class="audio-player">
        <button class="audio-play-btn" onclick="toggleAudio()" id="audio-btn" aria-label="Play">
          <svg id="play-icon" width="14" height="16" viewBox="0 0 14 16" fill="none">
            <path d="M2 1l11 7-11 7V1z" fill="#e8e0d0"/>
          </svg>
          <svg id="pause-icon" width="14" height="16" viewBox="0 0 14 16" fill="none" style="display:none">
            <rect x="1" y="1" width="4" height="14" fill="#e8e0d0"/>
            <rect x="9" y="1" width="4" height="14" fill="#e8e0d0"/>
          </svg>
        </button>
        <div class="audio-waveform" id="waveform"></div>
        <span class="audio-duration" id="audio-dur">0:00</span>
      </div>
    </div>

    <button class="ar-launch-btn" onclick="launchAR()">
      <svg class="ar-icon" viewBox="0 0 24 24" fill="none" stroke="#e8e0d0" stroke-width="1.5">
        <path d="M2 8V4h4M18 4h4v4M2 16v4h4M18 20h4v-4"/>
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 5v2M12 17v2M5 12H3M21 12h-2"/>
      </svg>
      Open in AR
    </button>
    <p class="ar-note">Point your camera at the image at this location.<br>Audio plays automatically.</p>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     SCREEN 4 — AR VIEW
══════════════════════════════════════════════ -->
<div class="screen hidden" id="screen-ar">
  <div id="ar-scene-container">
    <!-- A-Frame scene injected here by JS -->
  </div>
  <div class="ar-ui-overlay">
   <div class="ar-top-bar">
  <span class="ar-stop-name" id="ar-stop-name"></span>
  <button class="ar-close-btn" onclick="stopARAudio()" id="ar-audio-btn">⏸ Audio</button>
  <button class="ar-close-btn" onclick="closeAR()">Close</button>
</div>
    <div class="ar-frame-corner tl"></div>
    <div class="ar-frame-corner tr"></div>
    <div class="ar-frame-corner bl"></div>
    <div class="ar-frame-corner br"></div>
    <p class="ar-hint">Aim camera at the image</p>
  </div>
</div>

<!-- Toast notification -->
<div id="toast"></div>

<!-- ══════════════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════════════ -->
<script>
// ── Trail data ──────────────────────────────────────────────────────
// Replace lat/lng with real coordinates; audioSrc/imageSrc with real files
const STOPS = [
  {
    id: 'white-horse',
    number: '01',
    name: 'The White Horse Hotel',
    subtitle: 'West Street, Drogheda',
    era: '1963',
    description: 'Where Brendan Behan held court',
    lore: '"He was sitting there at the bar, large as life. That was Brendan." — Paul Murphy, former editor, Drogheda Independent.',
    text: 'In the summer of 1963, a young journalist walked into the White Horse Hotel on West Street to interview a man who had already become a legend. Paul Murphy, then working for the Drogheda Independent, found Brendan Behan at the bar. What followed was a conversation that stayed with him for sixty years.',
    audioLabel: 'Paul Murphy, 2020',
    audioDuration: '4:12',
    lat: 53.7183,
    lng: -6.3540,
    tags: ['oral history', 'literary', '1963'],
    // audioSrc points to your actual .mp3 file
    // imageSrc points to your .mind target file for AR tracking
    audioSrc: './audio/white-horse.mp3',
    imageSrc: './targets/white-horse.mind'
  },
  {
    id: 'connollys-shop',
    number: '02',
    name: "Connolly's Shop",
    subtitle: 'Shop Street, Drogheda',
    era: '1940s–60s',
    description: 'Commerce, community, memory',
    lore: `"You'd go in for one thing and come out knowing everything that had happened in the town that week." — Maura Byrne, Louth Archives OHA/0112(1).`,
    text: `Michael Byrne worked in Connolly Brothers on Shop Street. His wife Maura remembers the rituals of the town as it was: the St John's Eve bonfires, the rhythms of a community mapped onto its streets and seasons. This work draws directly from their recorded testimony, held in the Louth County Archives.`,
    audioLabel: 'Maura & Michael Byrne — Louth Archives OHA/0112(1)',
    audioDuration: '6:38',
    lat: 53.7190,
    lng: -6.3545,
    tags: ['oral history', 'archive', 'commerce'],
    audioSrc: null,
    imageSrc: null
  },
  {
    id: 'millmount',
    number: '03',
    name: 'Millmount',
    subtitle: 'Millmount Square, Drogheda',
    era: 'Ancient–present',
    description: 'The mound that remembers everything',
    lore: 'Neolithic passage tomb. Viking settlement. Cromwellian siege. 1922 Civil War shelling. Every layer still present beneath the surface.',
    text: 'Stand at Millmount and you stand on five thousand years of continuous human presence. The mound has been a burial site, a military fortification, a signal tower, and a site of political violence. It is now a museum. The town grew around it, grew from it, and cannot be understood without it.',
    audioLabel: 'Millmount ambient soundscape',
    audioDuration: '3:20',
    lat: 53.7155,
    lng: -6.3498,
    tags: ['landscape', 'history', 'archaeology'],
    audioSrc: null,
    imageSrc: null
  },
  {
    id: 'laurence-gate',
    number: '04',
    name: "St Laurence's Gate",
    subtitle: 'Laurence Street, Drogheda',
    era: '13th century',
    description: 'The last gate of the walled town',
    lore: 'One of only two surviving gates of the medieval walls that once enclosed the entire settlement. The road through it has not changed in eight hundred years.',
    text: "The barbican of St Laurence's Gate is the finest surviving example of a medieval town gate in Ireland. Generations have passed through this arch — merchants, pilgrims, soldiers, townspeople. To walk beneath it is to pass through every century at once.",
    audioLabel: 'Archival soundscape — medieval Drogheda',
    audioDuration: '2:55',
    lat: 53.7200,
    lng: -6.3475,
    tags: ['medieval', 'architecture', 'landscape'],
    audioSrc: null,
    imageSrc: null
  }
];

// ── State ────────────────────────────────────────────────────────────
let currentScreen = 'entry';
let currentStop = null;
let userLat = null;
let userLng = null;
let gpsWatchId = null;
let visitedStops = new Set();
let audioPlaying = false;
let audioTick = null;
let audioSeconds = 0;
let demoIndex = 0;

// ── Audio unlock for mobile ──────────────────────────────────────────
function unlockAudio() {
  if (!window._audio) window._audio = new Audio();
  window._audio.play().catch(() => {});
  window._audio.pause();
  window._audio.currentTime = 0;
  document.removeEventListener('touchstart', unlockAudio);
}
document.addEventListener('touchstart', unlockAudio);

// ── Screen management ────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  const el = document.getElementById('screen-' + name);
  if (el) el.classList.remove('hidden');
  currentScreen = name;
}

function showToast(msg, duration = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ── Entry ────────────────────────────────────────────────────────────
function enterTrail() {
  window._audio = new Audio();
  buildTrailList();
  showScreen('trail');
  startGPS();
}

// ── Trail list ───────────────────────────────────────────────────────
function buildTrailList() {
  const list = document.getElementById('trail-list');
  list.innerHTML = '';
  STOPS.forEach(stop => {
    const card = document.createElement('div');
    card.className = 'stop-card locked';
    card.id = 'card-' + stop.id;
    card.innerHTML = `
      <span class="stop-number">${stop.number}</span>
      <div class="stop-info">
        <p class="stop-name">${stop.name}</p>
        <p class="stop-description">${stop.description}</p>
        <p class="stop-meta">${stop.tags.join(' · ')}</p>
      </div>
      <div class="stop-proximity" id="prox-${stop.id}">
        <span class="proximity-dot"></span>—
      </div>`;
    card.onclick = () => {
      if (!card.classList.contains('locked')) openStop(stop.id);
    };
    list.appendChild(card);
  });
}

function updateTrailCount() {
  document.getElementById('trail-count').textContent =
    `${visitedStops.size} of ${STOPS.length} visited`;
}

// ── GPS ──────────────────────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) {
    setGPSStatus(false, 'Geolocation not available');
    unlockAllForDemo();
    return;
  }
  setGPSStatus(false, 'Finding your location…');
  gpsWatchId = navigator.geolocation.watchPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      setGPSStatus(true, 'Location active');
      updateProximity();
    },
    err => {
      setGPSStatus(false, 'Location unavailable — use Demo mode');
      unlockAllForDemo();
    },
    { enableHighAccuracy: true, maximumAge: 10000, timeout: 15000 }
  );
}

function setGPSStatus(active, msg) {
  document.getElementById('gps-icon').className = 'gps-icon' + (active ? ' active' : '');
  document.getElementById('gps-text').textContent = msg;
}

function distance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function updateProximity() {
  if (userLat === null) return;
  STOPS.forEach(stop => {
    const d = distance(userLat, userLng, stop.lat, stop.lng);
    const card = document.getElementById('card-' + stop.id);
    const prox = document.getElementById('prox-' + stop.id);
    const near = d < 80; // within 80m
    const dot = near ? '<span class="proximity-dot near"></span>' : '<span class="proximity-dot"></span>';
    if (near) {
      card.classList.remove('locked');
      card.classList.add('active');
      prox.innerHTML = dot + 'You are here';
      if (!visitedStops.has(stop.id)) showToast(`${stop.name} — tap to explore`);
    } else {
      const label = d < 1000 ? Math.round(d) + 'm' : (d/1000).toFixed(1) + 'km';
      prox.innerHTML = dot + label;
      if (d > 200) card.classList.add('locked');
    }
  });
}

// Demo mode — cycle through stops one by one
function simulateNearby() {
  unlockAllForDemo();
  const stop = STOPS[demoIndex % STOPS.length];
  showToast(`Demo: ${stop.name}`);
  const card = document.getElementById('card-' + stop.id);
  card.classList.add('active');
  document.getElementById('prox-' + stop.id).innerHTML =
    '<span class="proximity-dot near"></span>Demo mode';
  demoIndex++;
}

function unlockAllForDemo() {
  STOPS.forEach(stop => {
    const card = document.getElementById('card-' + stop.id);
    if (card) {
      card.classList.remove('locked');
      const prox = document.getElementById('prox-' + stop.id);
      if (prox) prox.innerHTML = '<span class="proximity-dot"></span>nearby';
    }
  });
  setGPSStatus(false, 'Demo mode — all stops unlocked');
}

// ── Stop detail ──────────────────────────────────────────────────────
function openStop(id) {
  const stop = STOPS.find(s => s.id === id);
  if (!stop) return;
  currentStop = stop;
  visitedStops.add(id);
  updateTrailCount();

  document.getElementById('detail-eyebrow').textContent = stop.era + ' · ' + stop.subtitle;
  document.getElementById('detail-title').textContent = stop.name;
  document.getElementById('detail-subtitle').textContent = stop.description;
  document.getElementById('detail-lore').textContent = stop.lore;
  document.getElementById('detail-text').textContent = stop.text;
  document.getElementById('audio-dur').textContent = stop.audioDuration;
  buildWaveform();
  resetAudio();

  showScreen('stop');
  document.getElementById('screen-stop').scrollTop = 0;
}

// ── Waveform (decorative — replace with real Web Audio in production) ─
function buildWaveform() {
  const wf = document.getElementById('waveform');
  wf.innerHTML = '';
  for (let i = 0; i < 36; i++) {
    const bar = document.createElement('div');
    const h = 8 + Math.random() * 20;
    bar.className = 'wave-bar';
    bar.style.height = h + 'px';
    wf.appendChild(bar);
  }
}

function toggleAudio() {
  audioPlaying = !audioPlaying;
  document.getElementById('play-icon').style.display = audioPlaying ? 'none' : 'block';
  document.getElementById('pause-icon').style.display = audioPlaying ? 'block' : 'none';

  if (audioPlaying) {
    if (currentStop.audioSrc) {
        if (!window._audio) window._audio = new Audio();
        window._audio.src = currentStop.audioSrc;
        window._audio.play();
    }
    animateWaveform();
    audioTick = setInterval(() => {
      audioSeconds++;
      const m = Math.floor(audioSeconds / 60);
      const s = String(audioSeconds % 60).padStart(2, '0');
      document.getElementById('audio-dur').textContent = m + ':' + s;
    }, 1000);
  } else {
    if (window._audio) window._audio.pause();
    clearInterval(audioTick);
    stopWaveformAnimation();
  }
}

function resetAudio() {
  audioPlaying = false;
  clearInterval(audioTick);
  audioSeconds = 0;
  document.getElementById('play-icon').style.display = 'block';
  document.getElementById('pause-icon').style.display = 'none';
  if (currentStop) document.getElementById('audio-dur').textContent = currentStop.audioDuration;
}

function animateWaveform() {
  const bars = document.querySelectorAll('.wave-bar');
  bars.forEach(b => {
    const animate = () => {
      if (!audioPlaying) return;
      b.style.background = `rgba(139, 58, 42, ${0.3 + Math.random() * 0.7})`;
      b.style.height = (4 + Math.random() * 24) + 'px';
      setTimeout(animate, 80 + Math.random() * 120);
    };
    animate();
  });
}

function stopWaveformAnimation() {
  document.querySelectorAll('.wave-bar').forEach(b => {
    b.style.background = 'rgba(232,224,208,0.2)';
  });
}

// ── AR ───────────────────────────────────────────────────────────────
function launchAR() {
  if (!currentStop) return;

  // In a real build: use currentStop.imageSrc as the .mind target file
  // and currentStop.audioSrc for the audio overlay.
  // Here we build a working A-Frame scene with a placeholder overlay.
  document.getElementById('ar-stop-name').textContent = currentStop.name;

  const container = document.getElementById('ar-scene-container');
  container.innerHTML = '';

  // Determine if we have a real .mind file or use placeholder
  const hasMindFile = !!currentStop.imageSrc;

  if (hasMindFile) {
    // Real AR scene with image tracking
    container.innerHTML = `
      <a-scene
        mindar-image="imageTargetSrc: ${currentStop.imageSrc}; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;"
        color-space="sRGB"
        renderer="colorManagement: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
          <!-- Overlay: fade in title text above the target image -->
          <a-text
            value="${currentStop.name}"
            font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
            color="#1a1612"
            align="center"
            width="1.2"
            position="0 0.35 0"
            animation="property: opacity; from: 0; to: 1; dur: 1200; easing: easeInQuad">
          </a-text>
          <!-- Atmospheric particle plane -->
          <a-plane
            color="#e8e0d0"
            opacity="0.85"
            width="1" height="0.6"
            position="0 0 -0.001"
            animation="property: opacity; from: 0; to: 0.85; dur: 800">
          </a-plane>
          <!-- Era label -->
          <a-text
            value="${currentStop.era}"
            font="https://cdn.aframe.io/fonts/mozillavr.fnt"
            color="#8b3a2a"
            align="center"
            width="0.5"
            position="0 -0.35 0"
            animation="property: opacity; from: 0; to: 1; dur: 1500; easing: easeInQuad">
          </a-text>
        </a-entity>
      </a-scene>`;
  } else {
    // Demo: camera feed with overlay UI (no .mind file needed)
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(stream => {
        const video = document.createElement('video');
        video.srcObject = stream;
        video.autoplay = true;
        video.playsInline = true;
        video.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
        container.appendChild(video);
        addARDemoOverlay(container);
      })
      .catch(() => {
        // No camera access in iframe — show static demo
        container.style.background = 'linear-gradient(135deg, #1a1612 0%, #2a1f18 100%)';
        addARDemoOverlay(container);
      });
  }

if (currentStop.audioSrc) {
  window._audio.src = currentStop.audioSrc;
  window._audio.play().catch(e => console.warn('Audio play failed:', e));
}
  showScreen('ar');
}

function addARDemoOverlay(container) {
  // Animated overlay that shows what AR content would look like
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position: absolute; inset: 0; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none;`;
  overlay.innerHTML = `
    <div style="
      border: 1px solid rgba(139,58,42,0.6);
      padding: 2rem 2.5rem;
      text-align: center;
      background: rgba(26,22,18,0.55);
      backdrop-filter: blur(4px);
      animation: fadeIn 1.2s ease forwards;
      opacity: 0;">
      <p style="font-family:'Courier New',monospace;font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:#8b3a2a;margin-bottom:0.8rem;">${currentStop ? currentStop.era : ''}</p>
      <p style="font-family:Georgia,serif;font-size:1.5rem;font-style:italic;color:#e8e0d0;margin-bottom:0.5rem;">${currentStop ? currentStop.name : ''}</p>
      <p style="font-family:Georgia,serif;font-size:0.85rem;color:rgba(232,224,208,0.6);font-style:italic;">${currentStop ? currentStop.description : ''}</p>
    </div>
  </footer>

</div>
</body>
